version: '3.9'
services:
  web:
    build: .
    command: gunicorn techsphere.wsgi:application --bind 0.0.0.0:8000 --workers 3
    ports:
      - '8000:8000'
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: techsphere
      POSTGRES_USER: techsphere_user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    restart: always
    ports:
      - '6379:6379'
volumes:
  postgres_data:
  static_volume:
  media_volume:
