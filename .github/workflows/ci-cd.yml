# GitHub Actions CI/CD Pipeline for TechSphere
# Runs tests, linting, and deploys to Railway

name: TechSphere CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ============================================================================
  # CODE QUALITY & LINTING
  # ============================================================================
  lint:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort bandit
      
      - name: Run Black (code formatting check)
        run: black --check .
        continue-on-error: true
      
      - name: Run isort (import sorting check)
        run: isort --check-only .
        continue-on-error: true
      
      - name: Run Flake8 (linting)
        run: flake8 apps techsphere --max-line-length=100 --exclude=migrations,venv
        continue-on-error: true
      
      - name: Run Bandit (security check)
        run: bandit -r apps techsphere -ll
        continue-on-error: true

  # ============================================================================
  # UNIT TESTS
  # ============================================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: techsphere_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov
      
      - name: Create test env file
        run: |
          cat > .env.test << EOF
          DJANGO_DEBUG=True
          DJANGO_SECRET_KEY=test-secret-key-not-for-production
          DATABASE_URL=postgresql://test_user:test_password@localhost:5432/techsphere_test
          REDIS_URL=redis://localhost:6379/0
          USE_R2=False
          ENVIRONMENT=test
          EOF
      
      - name: Run migrations
        run: python manage.py migrate --noinput
        env:
          DJANGO_SETTINGS_MODULE: techsphere.settings_production
          DJANGO_SECRET_KEY: test-secret-key
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/techsphere_test
      
      - name: Run tests with coverage
        run: |
          pytest --cov=apps --cov=techsphere \
                  --cov-report=xml \
                  --cov-report=term-missing \
                  --junitxml=junit/test-results.xml
        env:
          DJANGO_SETTINGS_MODULE: techsphere.settings_production
          DJANGO_SECRET_KEY: test-secret-key
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/techsphere_test
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: junit/test-results.xml

  # ============================================================================
  # SECURITY SCANNING
  # ============================================================================
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Run Safety check
        run: |
          pip install safety
          safety check --json || true
        continue-on-error: true
      
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'TechSphere'
          path: '.'
          format: 'JSON'
          args: >
            --enableExperimental
            --enableRetired
        continue-on-error: true

  # ============================================================================
  # BUILD DOCKER IMAGE
  # ============================================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # DEPLOY TO RAILWAY (on main branch only)
  # ============================================================================
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy to Railway
        uses: railway-app/deploy-action@v1
        with:
          railway-token: ${{ secrets.RAILWAY_TOKEN }}
          service: web
          environment: production

  # ============================================================================
  # POST-DEPLOYMENT VERIFICATION
  # ============================================================================
  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check deployment status
        run: |
          echo "Waiting for deployment to be ready..."
          sleep 30
          
          # Get Railway deployment URL from Railway CLI or environment
          RAILWAY_URL=${{ secrets.RAILWAY_PUBLIC_URL }}
          
          if [ -z "$RAILWAY_URL" ]; then
            echo "Warning: RAILWAY_PUBLIC_URL not set"
            exit 0
          fi
          
          # Health check
          response=$(curl -s -o /dev/null -w "%{http_code}" "$RAILWAY_URL/health/")
          
          if [ "$response" = "200" ]; then
            echo "✓ Deployment verified successfully"
            exit 0
          else
            echo "✗ Deployment health check failed with status: $response"
            exit 1
          fi
      
      - name: Notify Slack (optional)
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "❌ TechSphere Deployment Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*TechSphere Deployment Failed*\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }

  # ============================================================================
  # NOTIFY SUCCESS
  # ============================================================================
  notify:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: verify-deployment
    if: success()
    
    steps:
      - name: Send success notification
        run: echo "✓ All CI/CD checks passed and deployment succeeded!"
